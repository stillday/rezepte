name: Deploy Rezepte

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/stillday/rezepte:latest

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          source: docker-compose.yml
          target: /var/www/rezepte/

      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 2222
          script: |
            set -euo pipefail
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            cd /var/www/rezepte
            cat > .env << 'ENVEOF'
            MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            AUTH_SECRET=${{ secrets.AUTH_SECRET }}
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            BRING_EMAIL=${{ secrets.BRING_EMAIL }}
            BRING_PASSWORD=${{ secrets.BRING_PASSWORD }}
            BRING_LIST_UUID=${{ secrets.BRING_LIST_UUID }}
            ENVEOF
            docker pull ghcr.io/stillday/rezepte:latest
            docker compose up -d --no-build
            docker image prune -f
            echo "Deployment complete"
